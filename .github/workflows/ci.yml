name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            ./package-lock.json

      - name: Run backend verification
        shell: pwsh
        run: |
          if (Test-Path './scripts/test.ps1') {
            ./scripts/test.ps1
          }
          else {
            Write-Warning "Backend test script './scripts/test.ps1' was not found. Update this workflow for the target repository."
          }

      - name: Install frontend dependencies
        if: ${{ hashFiles('./package.json') != '' }}
        working-directory: .
        run: 

      - name: Run frontend tests
        if: ${{ hashFiles('./package.json') != '' }}
        working-directory: .
        run: 


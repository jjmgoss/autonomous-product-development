expected_claim_traits:
  - preventive maintenance
  - manual checks
  - solo operator
expected_theme_traits:
  - recurring toil
  - maintenance window
expected_candidate_traits:
  - calendar
  - maintenance
  - solo operators
forbidden_claim_patterns:
